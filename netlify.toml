[build]
  publish = "dist"
  command = "npm run build"

# Redirect www to non-www (301 permanent)
[[redirects]]
  from = "https://www.safe-grip.eu/*"
  to = "https://safe-grip.eu/:splat"
  status = 301
  force = true

# Redirect http www to https non-www
[[redirects]]
  from = "http://www.safe-grip.eu/*"
  to = "https://safe-grip.eu/:splat"
  status = 301
  force = true

# Redirect http to https for non-www
[[redirects]]
  from = "http://safe-grip.eu/*"
  to = "https://safe-grip.eu/:splat"
  status = 301
  force = true

# SPA fallback - must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security and caching
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
