<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <!-- ============================================
       SafeGrip Logo - Editable Version
       All elements with IDs for easy editing
       ============================================ -->
  
  <!-- BACKGROUND FRAME -->
  <g id="frame">
    <rect id="outer-frame" width="400" height="120" rx="16" fill="#1a1a1a"/>
    <rect id="yellow-plate" x="6" y="6" width="388" height="108" rx="12" fill="#f7d600"/>
  </g>
  
  <!-- METALLIC SHINE OVERLAY -->
  <g id="shine-overlay">
    <defs>
      <linearGradient id="plate-shine" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
        <stop offset="50%" stop-color="#ffffff" stop-opacity="0"/>
        <stop offset="100%" stop-color="#000000" stop-opacity="0.05"/>
      </linearGradient>
    </defs>
    <rect x="6" y="6" width="388" height="108" rx="12" fill="url(#plate-shine)"/>
  </g>
  
  <!-- CORNER SCREWS -->
  <g id="screws">
    <!-- Top-left screw -->
    <g id="screw-tl">
      <circle cx="24" cy="24" r="7" fill="#c9a800"/>
      <circle cx="24" cy="24" r="5" fill="#b89700"/>
      <path d="M20 24h8M24 20v8" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    
    <!-- Top-right screw -->
    <g id="screw-tr">
      <circle cx="376" cy="24" r="7" fill="#c9a800"/>
      <circle cx="376" cy="24" r="5" fill="#b89700"/>
      <path d="M372 24h8M376 20v8" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    
    <!-- Bottom-left screw -->
    <g id="screw-bl">
      <circle cx="24" cy="96" r="7" fill="#c9a800"/>
      <circle cx="24" cy="96" r="5" fill="#b89700"/>
      <path d="M20 96h8M24 92v8" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    
    <!-- Bottom-right screw -->
    <g id="screw-br">
      <circle cx="376" cy="96" r="7" fill="#c9a800"/>
      <circle cx="376" cy="96" r="5" fill="#b89700"/>
      <path d="M372 96h8M376 92v8" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
    </g>
  </g>
  
  <!-- DECORATIVE LINES -->
  <g id="decoration-lines">
    <path id="line-safe-thick" d="M50 32h80" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
    <path id="line-safe-thin" d="M55 24h65" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
    <path id="line-grip-thick" d="M260 32h90" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
    <path id="line-grip-thin" d="M265 24h75" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  
  <!-- SAFE WORDMARK -->
  <g id="wordmark-safe" fill="#1a1a1a">
    <!-- Decorative dash before S -->
    <path id="safe-dash" d="M42 56l4-16h16l-4 16z"/>
    
    <!-- S letter -->
    <path id="letter-s" d="M72 42c-4 0.5-7 1-10 2l-3 12c4-1.5 10-2.5 15-2 4 0.5 6 2 5 5-1 3-4 5-10 7l-5 2c-8 2.5-13 7-11 14 3 10 18 12 30 9l3-12c-5 1.5-12 2.5-17 1.5-3.5-0.7-5-2.5-4-5 1-3 4-4.5 9-6l5-2c9-3 14-8 12-16-2-9-12-11-19-9.5z"/>
    
    <!-- A letter -->
    <path id="letter-a" d="M110 42h18l20 46h-16l-3-10h-16l-5 10H92l18-46zm10 12l-7 16h13l-4-14z"/>
    
    <!-- F letter -->
    <path id="letter-f" d="M152 42h42l-3 12h-26l-3 10h22l-3 12h-22l-5 12h-16l14-46z"/>
    
    <!-- E letter -->
    <path id="letter-e" d="M196 42h42l-3 12h-28l-2 8h24l-3 10h-24l-2 8h28l-3 12h-42l14-50z"/>
  </g>
  
  <!-- GRIP WORDMARK -->
  <g id="wordmark-grip" fill="#1a1a1a">
    <!-- G letter with arrow notch -->
    <path id="letter-g-outer" d="M254 42c18-2 34 6 32 22-3 22-22 28-46 26l10-48zm4 36c12 1 18-5 20-14 1.5-7-4-11-14-10l-6 24z"/>
    <path id="letter-g-notch" d="M250 60h14l-3 12h-14l3-12z"/>
    
    <!-- R letter -->
    <path id="letter-r" d="M300 42h28c14 0 20 8 18 18-1.5 7-7 12-14 14l10 16h-18l-8-14h-8l-4 14h-16l12-48zm14 24h10c5 0 8-3 9-7 1-5-2-7-8-7h-10l-1 14z"/>
    
    <!-- I letter -->
    <path id="letter-i" d="M356 42h16l-12 48h-16l12-48z"/>
    
    <!-- P letter -->
    <path id="letter-p" d="M378 42h28c14 0 20 10 18 22-3 14-14 20-30 20h-12l-4 6h-16l16-48zm12 30h10c8 0 12-4 13-10 1-6-3-10-11-10h-10l-2 20z"/>
  </g>
</svg>
