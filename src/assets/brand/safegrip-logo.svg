<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 120" fill="none">
  <!-- Outer black rounded rectangle -->
  <rect width="360" height="120" rx="20" fill="#1a1a1a"/>
  
  <!-- Inner yellow plate -->
  <rect x="8" y="8" width="344" height="104" rx="14" fill="#f7d600"/>
  
  <!-- Subtle gradient overlay for depth -->
  <defs>
    <linearGradient id="plateShine" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ffe600" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4b600" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="8" y="8" width="172" height="104" rx="14" fill="url(#plateShine)"/>
  
  <!-- Corner screws -->
  <!-- Top-left screw -->
  <circle cx="28" cy="28" r="6" fill="#8b7500"/>
  <path d="M24 28h8M28 24v8" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Top-right screw -->
  <circle cx="332" cy="28" r="6" fill="#8b7500"/>
  <path d="M328 28h8M332 24v8" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Bottom-left screw -->
  <circle cx="28" cy="92" r="6" fill="#8b7500"/>
  <path d="M24 92h8M28 88v8" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Bottom-right screw -->
  <circle cx="332" cy="92" r="6" fill="#8b7500"/>
  <path d="M328 92h8M332 88v8" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- SAFE text - italic bold industrial style -->
  <g fill="#1a1a1a">
    <!-- Leading dash before S -->
    <path d="M42 52h18l-4 16H38l4-16z"/>
    
    <!-- S letter -->
    <path d="M62 44c12-2 28-2 32 8 2 6-2 12-10 14l-4 1c-6 2-8 4-7 7 1 4 8 5 16 3l6-1-2 10c-14 4-32 2-36-10-2-8 4-14 14-17l4-1c5-1 7-3 6-6-2-4-10-4-18-1l-6 2 2-10 3-1z"/>
    
    <!-- A letter -->
    <path d="M104 44h20l14 42h-16l-2-8h-16l-4 8H84l20-42zm8 10l-6 16h12l-4-16h-2z"/>
    
    <!-- F letter -->
    <path d="M140 44h38l-3 10h-22l-2 8h18l-2 10h-18l-4 14h-14l9-42z"/>
    
    <!-- E letter -->
    <path d="M178 44h38l-2 10h-24l-2 6h20l-2 10h-20l-2 6h24l-2 10h-38l10-42z"/>
  </g>
  
  <!-- Decorative lines above SAFE -->
  <path d="M58 38h60" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <path d="M62 32h50" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  
  <!-- GRIP text - italic bold industrial style -->
  <g fill="#1a1a1a">
    <!-- G letter with arrow notch -->
    <path d="M232 44c16-2 32 4 30 20-2 18-18 24-40 22l8-42zm4 32c10 1 16-4 17-12 1-6-4-10-12-9l-4 21z"/>
    <path d="M226 58h12l-2 10h-12l2-10z"/>
    
    <!-- R letter -->
    <path d="M268 44h26c12 0 18 6 16 16-1 6-6 10-12 12l8 14h-16l-6-12h-6l-3 12h-14l7-42zm12 22h8c4 0 7-2 8-6 0-4-3-6-7-6h-8l-1 12z"/>
    
    <!-- I letter -->
    <path d="M318 44h14l-8 42h-14l8-42z"/>
    
    <!-- P letter -->
    <path d="M336 44h26c12 0 18 8 16 18-2 12-12 18-26 18h-10l-3 6h-14l11-42zm10 26h8c6 0 10-3 11-8 0-5-4-8-10-8h-8l-1 16z"/>
  </g>
  
  <!-- Decorative lines above GRIP -->
  <path d="M230 38h90" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <path d="M234 32h80" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
</svg>